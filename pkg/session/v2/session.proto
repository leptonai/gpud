syntax = "proto3";

package gpud.session.v2;

option go_package = "github.com/leptonai/gpud/pkg/session/v2;sessionv2";

import "google/protobuf/timestamp.proto";

service SessionService {
  rpc Connect(stream AgentEnvelope) returns (stream ManagerEnvelope);
}

message AgentEnvelope {
  oneof payload {
    Hello hello = 1;
    Response response = 2;
  }
}

message ManagerEnvelope {
  oneof payload {
    HelloAck hello_ack = 1;
    Request request = 2;
    DrainNotice drain_notice = 3;
  }
}

message Hello {
  uint32 min_protocol_revision = 1;
  uint32 max_protocol_revision = 2;
  string agent_version = 3;
  uint32 max_receive_message_bytes = 4;
  repeated string capabilities = 5;
}

message HelloAck {
  uint32 protocol_revision = 1;
  string manager_instance_id = 2;
  uint32 max_receive_message_bytes = 3;
}

message Request {
  string request_id = 1;

  oneof command {
    GetHealthStatesCommand get_health_states = 10;
    GetEventsCommand get_events = 11;
    GetMetricsCommand get_metrics = 12;
    UpdateCommand update = 13;
    SetHealthyCommand set_healthy = 14;
    RebootCommand reboot = 15;
    UpdateConfigCommand update_config = 16;
    BootstrapCommand bootstrap = 17;
    InjectFaultCommand inject_fault = 18;
    DiagnosticCommand diagnostic = 19;
    GetPackageStatusCommand get_package_status = 20;
    LogoutCommand logout = 21;
    GossipCommand gossip = 22;
    TriggerComponentCommand trigger_component = 23;
    SetPluginSpecsCommand set_plugin_specs = 24;
    UpdateTokenCommand update_token = 25;
    GetKAPMTLSStatusCommand get_kap_mtls_status = 26;
    UpdateKAPMTLSCredentialsCommand update_kap_mtls_credentials = 27;
    ActivateKAPMTLSCommand activate_kap_mtls = 28;
  }
}

message Response {
  string request_id = 1;
  bytes payload_json = 2;
}

message GetHealthStatesCommand {}

message GetEventsCommand {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
}

message GetMetricsCommand {
  int64 since_nanos = 1;
}

message UpdateCommand {
  string version = 1;
  int64 since_nanos = 2;
}

message SetHealthyCommand {
  repeated string components = 1;
  int64 since_nanos = 2;
}

message RebootCommand {}

message UpdateConfigCommand {
  map<string, string> values = 1;
}

message BootstrapCommand {
  int64 timeout_seconds = 1;
  string script_base64 = 2;
  bool request_present = 3;
}

message InjectFaultCommand {
  bool request_present = 1;

  oneof fault {
    int64 xid = 2;
    KernelMessage kernel_message = 3;
  }
}

message KernelMessage {
  string priority = 1;
  string message = 2;
}

message DiagnosticCommand {
  string report_id = 1;
  string type = 2;
  int64 timeout_seconds = 3;
  bool request_present = 4;
}

message GetPackageStatusCommand {}

message LogoutCommand {}

message GossipCommand {}

message TriggerComponentCommand {
  string component_name = 1;
  string tag_name = 2;
}

message SetPluginSpecsCommand {
  bool specs_present = 1;
  repeated PluginSpec specs = 2;
}

message PluginSpec {
  string plugin_name = 1;
  string plugin_type = 2;
  repeated string component_list = 3;
  string component_list_file = 4;
  string run_mode = 5;
  repeated string tags = 6;
  Plugin health_state_plugin = 7;
  int64 timeout_nanos = 8;
  int64 interval_nanos = 9;
}

message Plugin {
  repeated PluginStep steps = 1;
  PluginOutputParser parser = 2;
}

message PluginStep {
  string name = 1;
  BashScript run_bash_script = 2;
}

message BashScript {
  string content_type = 1;
  string script = 2;
}

message PluginOutputParser {
  repeated PluginJSONPath json_paths = 1;
  string log_path = 2;
}

message PluginJSONPath {
  string query = 1;
  string field = 2;
  PluginMatchRule expect = 3;
  map<string, PluginMatchRule> suggested_actions = 4;
}

message PluginMatchRule {
  optional string regex = 1;
}

message UpdateTokenCommand {
  string token = 1;
}

message GetKAPMTLSStatusCommand {}

message UpdateKAPMTLSCredentialsCommand {
  bytes certificate_pem = 1;
  bytes private_key_pem = 2;
  bytes gateway_ca_pem = 3;
  string gateway_endpoint = 4;
  string server_name = 5;
  string client_ca_fingerprint = 6;
  string gateway_ca_fingerprint = 7;
}

message ActivateKAPMTLSCommand {}

message DrainNotice {
  int64 reconnect_after_millis = 1;
}
