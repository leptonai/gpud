apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "gpud.fullname" . }}
  labels:
    {{- include "gpud.labels" . | nindent 4 }}
spec:
  # The selector determines which pods the DaemonSet manages.
  # It must match the labels in the pod template.
  selector:
    matchLabels:
      {{- include "gpud.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      # Allows for custom pod annotations.
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        # These labels are used by the DaemonSet's selector.
        {{- include "gpud.selectorLabels" . | nindent 8 }}
    spec:
      # --- Pod Identity & Security ---
      serviceAccountName: {{ include "gpud.serviceAccountName" . }}
      # K8s auto-mounts SA tokens unless explicitly disabled; see https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#opt-out-of-automounting-service-account-tokens
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # --- Node-level Settings & Lifecycle ---
      # Required for the driver to interact with the host's network stack (e.g. for correct IP reporting).
      # GPUd is intentionally exposed via host networking, so there is no Service object for this chart.
      # Consumers should reach GPUd via each node's IP/port (e.g. https://<node-ip>:15132).
      hostNetwork: true
      # Required for the driver to inspect processes on the host (e.g. via /proc).
      # Also required by the chart-default reboot command: nsenter targets host PID 1
      # so gpud can request a node reboot from inside the container.
      hostPID: true
      restartPolicy: Always
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      # --- Scheduling ---
      # Mark this pod as a critical add-on to prevent eviction.
      priorityClassName: "system-node-critical"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # --- Storage ---
      volumes:
        # System logs directory for GPUd to write logs and monitor system log files
        # Required by: pkg/gpud-manager/systemd/systemd.go (writes to /var/log/gpud.log)
        - name: host-log
          hostPath:
            path: /var/log
            type: Directory

        # Persistent storage for kernel crash dumps and system error logs
        # Required for: analyzing system crashes and kernel panics
        - name: host-pstore
          hostPath:
            path: /var/lib/systemd/pstore
            type: DirectoryOrCreate

        # Device files for hardware access and kernel message buffer
        # Required by: pkg/kmsg/watcher.go:46 (reads /dev/kmsg for kernel messages)
        # Also provides access to GPU devices (/dev/nvidia*), block devices, etc.
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory

        {{- if .Values.gpud.mountHostSys }}
        # Sysfs virtual filesystem for hardware and device information
        # Required by:
        # - components/accelerator/nvidia/infiniband/class/class.go:34 (/sys/class/infiniband - InfiniBand monitoring)
        # - pkg/host/machine_id.go:152 (/sys/class/dmi - DMI/hardware info for machine ID)
        # - pkg/fuse/fuse.go:18 (/sys/fs/fuse/connections - FUSE filesystem monitoring)
        # Can be disabled for security-sensitive environments via gpud.mountHostSys=false
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        {{- end }}

        {{- if .Values.gpud.mountHostProc }}
        # Procfs virtual filesystem for process and kernel information
        # Required by:
        # - pkg/file/descriptors_linux.go:27,41 (/proc/sys/fs/file-max, file-nr - file descriptor limits)
        # - pkg/host/boot_id.go:9 (/proc/sys/kernel/random/boot_id - unique boot identifier)
        # - pkg/disk/mount.go:14,105 (/proc/self/mountinfo - mount point information)
        # Can be disabled for security-sensitive environments via gpud.mountHostProc=false
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        {{- end }}

        # GPUd's persistent data directory for state, cache, and configuration
        - name: lib-gpud
          hostPath:
            path: /var/lib/gpud
            type: DirectoryOrCreate

        {{- if .Values.nodeLabelExporter.enabled }}
        # Pod-scoped scratch space for the node-label snapshot that
        # node-label-init hands to gpud. An emptyDir rather than the
        # /var/lib/gpud hostPath: gpud reads the file once at startup, so it
        # has no reason to persist on the host, and a fresh volume per pod
        # means no stale label file from a previous release can leak in.
        - name: node-labels
          emptyDir: {}
        {{- end }}

        # Machine ID for unique node identification
        # Required by: pkg/host/machine_id.go (reads machine-id for node identification)
        - name: host-machine-id
          hostPath:
            path: /etc/machine-id
            type: FileOrCreate

        {{- if .Values.gpud.mountHostDevMem }}
        # Required for direct memory access to inspect hardware state (e.g. PCIe config space).
        # Addressed https://github.com/leptonai/gpud/issues/1144:
        # On some environments (e.g. GKE), /dev/mem may not be exposed or not be a CharDevice.
        # This conditional allows disabling the mount to prevent pod startup failures.
        - name: host-dev-mem
          hostPath:
            path: /dev/mem
            # We explicitly specify CharDevice to ensure we are mounting the correct device.
            # If this fails, set gpud.mountHostDevMem to false.
            type: CharDevice
        {{- end }}

        # Kubelet directory for container and pod information
        # Required for: monitoring containerized workloads and Kubernetes integration
        - name: host-kubelet-vol
          hostPath:
            path: /var/lib/kubelet
            type: DirectoryOrCreate

        {{- if .Values.gpud.mountContainerd }}
        # Host containerd runtime directory (holds containerd.sock).
        # Required by: components/containerd (stat the socket and reach the CRI
        # endpoint at unix:///run/containerd/containerd.sock).
        # DirectoryOrCreate so the pod still starts on nodes without containerd.
        # Disable via gpud.mountContainerd=false on nodes without containerd.
        - name: host-run-containerd
          hostPath:
            path: /run/containerd
            type: DirectoryOrCreate

        # Host containerd config directory (holds config.toml).
        # Required by: components/containerd (read /etc/containerd/config.toml to
        # verify the NVIDIA runtime is configured). Mounted read-only.
        - name: host-etc-containerd
          hostPath:
            path: /etc/containerd
            type: DirectoryOrCreate
        {{- end }}
      {{- if .Values.extraVolumes }}
      {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}

      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}

      # --- Containers ---
      # --- OPTIONAL: Init Containers ---
      # This section is entirely OPTIONAL and only renders when:
      # 1. nodeLabelExporter.enabled=true (for init-only Kubernetes node-label reading), OR
      # 2. Custom initContainers are specified in values.yaml
      # By default, nodeLabelExporter.enabled=false, so no label init container is created.
      {{- if or .Values.nodeLabelExporter.enabled .Values.initContainers }}
      initContainers:
        {{- if .Values.nodeLabelExporter.enabled }}
        # OPTIONAL: Node Label Reader Init Container
        # WHY init instead of a polling sidecar: gpud reads this file only while
        # building its startup command, so updates after exec cannot reconfigure
        # the running process. Fetching once before startup is therefore sufficient.
        # This init container retries until it atomically writes fresh node labels,
        # preventing gpud from starting with a missing or stale machine identity.
        # Enable with: nodeLabelExporter.enabled=true
        # Requires RBAC: nodeLabelExporter.rbac.create=true (creates ClusterRole for node read access)
        - name: node-label-init
          # Needs a shell-capable image; distroless kubectl images lack /bin/sh so the script would fail.
          image: "{{ .Values.nodeLabelExporter.image.repository }}:{{ .Values.nodeLabelExporter.image.tag }}"
          imagePullPolicy: {{ .Values.nodeLabelExporter.image.pullPolicy }}
          # No securityContext: the label file goes to a kubelet-created
          # (world-writable) emptyDir, so the kubectl image's default non-root
          # UID can write it. Nothing here touches the host.
          command:
            - /bin/sh
            - -ec
            - |
              set -o errexit
              set -o nounset
              # pipefail not supported in dash (Ubuntu's /bin/sh).
              # POSIX special builtins (like `set`) cause the shell to exit on failure
              # even in `|| true` constructs. A subshell safely isolates the test.
              if ( set -o pipefail ) 2>/dev/null; then set -o pipefail; fi

              tmp_file="${OUTPUT_FILE}.tmp"
              mkdir -p "$(dirname "${OUTPUT_FILE}")"

              # gpud consumes this file once at startup. Retry here rather than
              # relying on a sidecar: a sidecar could update the file later, but
              # cannot make the already-running gpud process reload it.
              while true; do
                if kubectl get node "${NODE_NAME}" \
                  -o go-template='{{`{{range $k,$v := .metadata.labels}}{{printf "%s=%s\n" $k $v}}{{end}}`}}' \
                  > "${tmp_file}"; then
                  # Atomic move prevents the main container from ever reading a
                  # partially written label file.
                  mv "${tmp_file}" "${OUTPUT_FILE}"
                  echo "Successfully wrote node labels to ${OUTPUT_FILE}"
                  break
                fi

                rm -f "${tmp_file}"
                echo "Waiting to fetch node labels for ${NODE_NAME}; retrying in 5 seconds"
                sleep 5
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OUTPUT_FILE
              value: {{ .Values.nodeLabelExporter.outputFile | quote }}
          {{- with .Values.nodeLabelExporter.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: node-labels
              mountPath: {{ dir .Values.nodeLabelExporter.outputFile }}
          {{- with .Values.nodeLabelExporter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          # Uses the image tag from values.yaml, but defaults to the chart's appVersion if not set.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Privileged access is required for hardware inspection and low-level system access.
          # The default rebootCommands script also needs the privileges to enter host namespaces
          # and ask the host init system to reboot the node.
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
{{- if .Values.gpud.commandOverride }}
            {{- toYaml .Values.gpud.commandOverride | nindent 12 }}
{{- else }}
            - /bin/sh
            - -ec
            - |
              # Shell safety options:
              # - errexit: Exit immediately if any command fails
              # - nounset: Treat unset variables as errors
              # - pipefail: Pipeline fails if any command fails (not just the last)
              set -o errexit
              set -o nounset
              # pipefail not supported in dash (Ubuntu's /bin/sh).
              # POSIX special builtins (like `set`) cause the shell to exit on failure
              # even in `|| true` constructs. A subshell safely isolates the test.
              if ( set -o pipefail ) 2>/dev/null; then set -o pipefail; fi

              # --- OPTIONAL: Read configuration from Kubernetes node labels ---
              # When nodeLabelExporter is enabled, node-label-init writes node labels to this file.
              # This supplies endpoint/token/machine-id configuration for this gpud start.
              LABEL_FILE="{{ .Values.nodeLabelExporter.outputFile }}"
              NODE_LABEL_EXPORTER_ENABLED="{{ .Values.nodeLabelExporter.enabled }}"

              # Label keys can be overridden via environment variables (useful for testing)
              EP_LABEL_KEY="${GPUD_ENDPOINT_LABEL_KEY:-{{ .Values.nodeLabelExporter.labelKeys.endpoint }}}"
              TOKEN_LABEL_KEY="${GPUD_TOKEN_LABEL_KEY:-{{ .Values.nodeLabelExporter.labelKeys.token }}}"
              MID_LABEL_KEY="${GPUD_MACHINE_ID_LABEL_KEY:-{{ .Values.nodeLabelExporter.labelKeys.machineId }}}"

              # Initialize empty - will be populated from label file if it exists
              EP=""
              TOKEN=""
              MID=""

              # The label file lives on a pod-scoped emptyDir, so it cannot be
              # stale by construction. Keep the enabled guard anyway: if
              # outputFile is overridden to a host-persisted path, disabling
              # nodeLabelExporter must still mean no leftover label file can
              # silently override the configured endpoint, token, or machine ID.
              if [ "$NODE_LABEL_EXPORTER_ENABLED" = "true" ] && [ -f "$LABEL_FILE" ]; then
                # Parse label file using awk with index() for EXACT string matching:
                # - index($0, key"=") == 1: Line must START with "key=" (prevents partial matches)
                # - substr($0, length(key)+2): Extract everything AFTER the "=" sign
                # - This handles dots/slashes in keys and preserves "=" in values (e.g., base64)
                # Example: "gpud.dgxc.lepton.ai/endpoint=https://api.example.com" -> "https://api.example.com"
                EP="$(awk -v key="$EP_LABEL_KEY" 'index($0, key"=") == 1 {print substr($0, length(key)+2); exit}' "$LABEL_FILE")"
                TOKEN="$(awk -v key="$TOKEN_LABEL_KEY" 'index($0, key"=") == 1 {print substr($0, length(key)+2); exit}' "$LABEL_FILE")"
                MID="$(awk -v key="$MID_LABEL_KEY" 'index($0, key"=") == 1 {print substr($0, length(key)+2); exit}' "$LABEL_FILE")"
              fi

              # --- Build gpud command arguments ---
              # Using "set --" to safely build argument list without eval or quoting issues.
              # Each "set -- "$@" ..." appends to the positional parameters ($1, $2, etc.)
              set -- run
              set -- "$@" --listen-address="{{ .Values.gpud.listenAddress }}"
              set -- "$@" --log-level="{{ .Values.gpud.logLevel }}"

              # Endpoint priority: Node label > values.yaml > (none)
              ENDPOINT="{{ .Values.gpud.endpoint }}"
              if [ -n "$EP" ]; then
                ENDPOINT="$EP"  # Label value overrides values.yaml
              fi
              if [ -n "$ENDPOINT" ]; then
                set -- "$@" --endpoint="$ENDPOINT"
              fi

              # A token Secret (gpud.tokenSecret) is injected as GPUD_TOKEN and
              # takes priority over any token node label. This supports clusters
              # that store the gpud session token in a Secret rather than a label.
              if [ -n "${GPUD_TOKEN:-}" ]; then
                TOKEN="$GPUD_TOKEN"
              fi

              # Token vs machine-id are intentionally sourced differently:
              #   --token: a SHARED, cluster/node-group enrollment credential
              #     ("may I join?"). Every node uses the same token (from the
              #     gpud.tokenSecret Secret, or a token label). It does NOT
              #     identify the machine.
              #   --machine-id: the UNIQUE per-node identity ("who am I?"), read
              #     from each node's machine-id label. Passing it keeps the node
              #     registered as the SAME machine across restarts/replacement.
              if [ -n "$TOKEN" ]; then
                set -- "$@" --token="$TOKEN"
              fi
              if [ -n "$MID" ]; then
                set -- "$@" --machine-id="$MID"
              fi

              # When the node's machine-id label changes (the node was deleted from
              # its node group and rejoined, binding a NEW machine object), the
              # persisted /var/lib/gpud identity is stale. --machine-id-overwrite
              # tells gpud to discard that stale identity and check in with the
              # requested machine instead of failing. Reboot/health state is preserved.
              if [ "${GPUD_MACHINE_ID_OVERWRITE:-}" = "true" ]; then
                set -- "$@" --machine-id-overwrite
              fi

              # Pods restart often; the cached /var/lib/gpud session token can be stale
              # (for example, after workspace token rotation). Preserve the chart's
              # explicit opt-out now that refresh is enabled by default in gpud.
              if [ "${GPUD_REFRESH_SESSION_TOKEN:-}" = "false" ]; then
                set -- "$@" --refresh-session-token=false
              fi

              set -- "$@" --enable-auto-update={{ .Values.gpud.enableAutoUpdate }}
              set -- "$@" --auto-update-exit-code={{ .Values.gpud.autoUpdateExitCode }}

              # Log the command for debugging, then exec to replace shell with gpud.
              # Keep the multi-line reboot script out of the startup log; gpud logs it
              # when a reboot request actually schedules and executes it.
              start_log_args="$*"

              # The chart default sets a host-namespace reboot script. Users can
              # set gpud.rebootCommands="" to preserve gpud's built-in sudo reboot path.
              if [ -n "${GPUD_REBOOT_COMMANDS:-}" ]; then
                start_log_args="$start_log_args --reboot-commands=<set>"
                set -- "$@" --reboot-commands="$GPUD_REBOOT_COMMANDS"
              fi

              # The chart default wraps the disk component's host tools with
              # nsenter so they read the node's disks instead of the container's
              # overlay. Users can set the corresponding gpud.*Commands value to
              # "" to preserve gpud's built-in in-namespace behavior.
              if [ -n "${GPUD_FINDMNT_COMMANDS:-}" ]; then
                start_log_args="$start_log_args --findmnt-commands=<set>"
                set -- "$@" --findmnt-commands="$GPUD_FINDMNT_COMMANDS"
              fi
              if [ -n "${GPUD_LSBLK_COMMANDS:-}" ]; then
                start_log_args="$start_log_args --lsblk-commands=<set>"
                set -- "$@" --lsblk-commands="$GPUD_LSBLK_COMMANDS"
              fi
              if [ -n "${GPUD_BLOCKDEV_USAGE_COMMANDS:-}" ]; then
                start_log_args="$start_log_args --blockdev-usage-commands=<set>"
                set -- "$@" --blockdev-usage-commands="$GPUD_BLOCKDEV_USAGE_COMMANDS"
              fi
              if [ -n "${GPUD_CONTAINERD_SERVICE_ACTIVE_COMMANDS:-}" ]; then
                start_log_args="$start_log_args --containerd-service-active-commands=<set>"
                set -- "$@" --containerd-service-active-commands="$GPUD_CONTAINERD_SERVICE_ACTIVE_COMMANDS"
              fi

              # Using exec ensures gpud receives signals directly (important for graceful shutdown).
              echo "Starting: /usr/local/bin/gpud $start_log_args"
              exec /usr/local/bin/gpud "$@"
{{- end }}

          env:
            - name: GPUD_NO_USAGE_STATS
              value: {{ not .Values.gpud.telemetry.enabled | quote }}
            {{- if .Values.gpud.tokenSecret.name }}
            # Session token sourced from an existing Secret (takes priority over a
            # token node label). Consumed by the startup script as $GPUD_TOKEN.
            - name: GPUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gpud.tokenSecret.name | quote }}
                  key: {{ .Values.gpud.tokenSecret.key | quote }}
            {{- end }}
            {{- if .Values.gpud.machineIdOverwrite }}
            # Allow a changed machine-id label to check in the node (see the
            # startup script). Consumed as $GPUD_MACHINE_ID_OVERWRITE.
            - name: GPUD_MACHINE_ID_OVERWRITE
              value: "true"
            {{- end }}
            # Re-fetch the session token on start unless explicitly disabled.
            # Consumed as $GPUD_REFRESH_SESSION_TOKEN.
            - name: GPUD_REFRESH_SESSION_TOKEN
              value: {{ .Values.gpud.refreshSessionToken | quote }}
            {{- if .Values.gpud.rebootCommands }}
            - name: GPUD_REBOOT_COMMANDS
              value: {{ .Values.gpud.rebootCommands | quote }}
            {{- end }}
            {{- if .Values.gpud.findmntCommands }}
            - name: GPUD_FINDMNT_COMMANDS
              value: {{ .Values.gpud.findmntCommands | quote }}
            {{- end }}
            {{- if .Values.gpud.lsblkCommands }}
            - name: GPUD_LSBLK_COMMANDS
              value: {{ .Values.gpud.lsblkCommands | quote }}
            {{- end }}
            {{- if .Values.gpud.blockdevUsageCommands }}
            - name: GPUD_BLOCKDEV_USAGE_COMMANDS
              value: {{ .Values.gpud.blockdevUsageCommands | quote }}
            {{- end }}
            {{- if .Values.gpud.containerdServiceActiveCommands }}
            - name: GPUD_CONTAINERD_SERVICE_ACTIVE_COMMANDS
              value: {{ .Values.gpud.containerdServiceActiveCommands | quote }}
            {{- end }}

          {{- if .Values.service.enabled }}
          ports:
            - name: https
              # Must match the port in gpud.listenAddress (default 15132)
              # Uses service.port for reliability - livenessProbe.httpGet.port may not exist
              # if user customizes livenessProbe to use exec or tcpSocket instead of httpGet.
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- end }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          # No readinessProbe is defined
          {{- with .Values.resources }}
          # Omitted entirely when values sets "resources: null", so the
          # DaemonSet consumes none of the node's allocatable resources.
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            # System logs - GPUd writes logs here and monitors system logs
            - name: host-log
              mountPath: /var/log

            # Kernel crash dumps and persistent storage for error analysis
            - name: host-pstore
              mountPath: /var/lib/systemd/pstore

            # Device files - Critical for:
            # - /dev/kmsg: kernel message buffer (pkg/kmsg/watcher.go)
            # - /dev/nvidia*: GPU devices for NVIDIA monitoring
            # - /dev/dri/*: GPU DRM devices
            - name: host-dev
              mountPath: /dev

            {{- if .Values.gpud.mountHostSys }}
            # Sysfs - Hardware/device info (read-only for safety)
            # - /sys/class/infiniband: InfiniBand network monitoring
            # - /sys/class/dmi: Hardware/DMI information
            # - /sys/fs/fuse/connections: FUSE filesystem stats
            - name: host-sys
              mountPath: /sys
              readOnly: true
            {{- end }}

            {{- if .Values.gpud.mountHostProc }}
            # Procfs - Kernel/process info (read-only for safety)
            # - /proc/sys/fs/file-*: File descriptor limits and usage
            # - /proc/sys/kernel/random/boot_id: Unique boot identifier
            # - /proc/self/mountinfo: Current mount points
            - name: host-proc
              mountPath: /proc
              readOnly: true
            {{- end }}

            # GPUd data directory for runtime state and configuration
            - name: lib-gpud
              mountPath: /var/lib/gpud

            {{- if .Values.nodeLabelExporter.enabled }}
            # Node-label snapshot written by node-label-init; the startup
            # script reads endpoint/token/machine-id from it once.
            - name: node-labels
              mountPath: {{ dir .Values.nodeLabelExporter.outputFile }}
              readOnly: true
            {{- end }}

            # Machine ID for unique node identification (read-only)
            - name: host-machine-id
              mountPath: /etc/machine-id
              readOnly: true

            {{- if .Values.gpud.mountHostDevMem }}
            # Physical memory access for hardware diagnostics (read-only)
            # Conditional mount - can be disabled for GKE/restricted environments
            # via gpud.mountHostDevMem=false (addresses issue #1144)
            - name: host-dev-mem
              mountPath: /dev/mem
              readOnly: true
            {{- end }}

            # Kubelet data for container/pod monitoring (read-only)
            - name: host-kubelet-vol
              mountPath: /var/lib/kubelet
              readOnly: true

            {{- if .Values.gpud.mountContainerd }}
            # Host containerd socket directory for containerd monitoring.
            # Mounted at the same path gpud expects (/run/containerd/containerd.sock).
            # Not read-only: connecting to the CRI unix socket requires write access.
            - name: host-run-containerd
              mountPath: /run/containerd

            # Host containerd config for the NVIDIA-runtime check (read-only).
            # Mounted at the same path gpud reads (/etc/containerd/config.toml).
            - name: host-etc-containerd
              mountPath: /etc/containerd
              readOnly: true
            {{- end }}
          {{- if .Values.extraVolumeMounts }}
          {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
