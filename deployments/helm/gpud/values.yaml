# Default values for GPUd.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# String to override the release name.
nameOverride: ""
# String to override the fully qualified application name.
fullnameOverride: ""

image:
  repository: nvcr.io/nvidia/dgx-cloud-lepton/gpud
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Application-specific settings for the GPUd container.
gpud:
  # Telemetry and usage data collection settings.
  telemetry:
    # Set to false to disable collection of anonymous usage data.
    enabled: false

  # The address and port gpud listens on.
  listenAddress: "0.0.0.0:15132"

  # The log level for gpud.
  logLevel: "info"

  # The endpoint for the control plane.
  endpoint: "gpud-manager-prod01.dgxc-lepton.nvidia.com"

  # Optional: read the gpud session token from a Secret instead of a node label.
  # Set create=true and value to have this chart create the Secret, or leave
  # create=false to reference an existing Secret. When name is set, the token is
  # injected as the TOKEN env via secretKeyRef and takes priority over any token
  # node label. Leave name empty to rely on the node label or no token.
  #
  # TOKEN MODEL: this is a SHARED, cluster/node-group-level enrollment credential.
  # Every gpud pod in the DaemonSet reads the SAME Secret, so all machines
  # authenticate to the control plane with the SAME token. Machines are NOT told
  # apart by the token -- they are distinguished by their unique per-node
  # machine ID (see nodeLabelExporter.labelKeys.machineId below). In short:
  #   - token      = "may I join this workspace?"  (shared across all nodes)
  #   - machine ID = "which machine am I?"         (unique per node)
  # For per-machine tokens instead (e.g. to revoke a single node), leave this
  # empty and put a distinct token in each node's label via nodeLabelExporter.
  tokenSecret:
    create: false
    name: ""
    key: "TOKEN"
    value: ""

  # Allow a node to check in when its machine identity changes.
  #
  # gpud persists its machine id + session token in /var/lib/gpud (a node-scoped
  # hostPath that survives reboots). In the DaemonSet pattern a node can be
  # deleted from its node group and rejoined, binding a NEW machine object (new
  # machine-id label) while the OLD identity is still persisted on disk. With this
  # enabled, gpud passes "gpud run --machine-id-overwrite": when the machine-id
  # label differs from the persisted one, it discards the stale login identity
  # (machine id + session token) and checks in with the requested machine. Reboot/
  # health state is preserved.
  #
  # Defaults to true because that re-check-in-on-rejoin behavior is what the
  # container/DaemonSet pattern wants, and it trusts the platform-managed
  # machine-id node label as the source of truth. Set to false to keep gpud's
  # strict guard (fail instead of retarget) -- appropriate when machine identity
  # must never change without manually clearing /var/lib/gpud.
  machineIdOverwrite: true

  # Re-fetch the session token from the control plane on every start.
  #
  # gpud caches its session token in /var/lib/gpud and normally takes a "skip
  # login" fast path on restart when a machine id is already persisted, reusing
  # that cached token. The control plane returns the current workspace-scoped
  # session token on every successful login, so with this enabled gpud passes
  # "gpud run --refresh-session-token" to always re-login and re-fetch a current
  # token instead of trusting the cached one. This prevents a stale cached token
  # (e.g. after a workspace token rotation) from breaking session keepalive, at
  # the cost of one extra
  # login round-trip per start.
  #
  # Defaults to true for the container/DaemonSet pattern (pods restart often and
  # should always come up with a fresh token). Set to false to keep the
  # skip-login optimization. TODO: make always-refresh the default gpud behavior
  # and retire this toggle once validated in production.
  refreshSessionToken: true

  # Enable auto update of gpud.
  enableAutoUpdate: false

  # The exit code to use when auto-updating.
  # set -1 to disable exit code
  autoUpdateExitCode: -1

  # --- Host command overrides ---
  # The settings in this block (rebootCommands and the disk findmntCommands /
  # lsblkCommands / blockdevUsageCommands) wrap host tools with nsenter so they
  # run in the host's namespaces instead of the container's. They share the same
  # requirements: hostPID=true, securityContext.privileged=true, runAsUser=0.
  # Set any of them to "" to fall back to gpud's built-in in-namespace behavior.

  # Bash script passed to "gpud run --reboot-commands".
  # Empty keeps gpud's built-in reboot behavior, which runs "sudo reboot" after
  # a 10-second delay. The Helm chart sets this by default because gpud runs
  # inside a container here; asking the container to reboot itself is not enough.
  #
  # The script enters the host namespaces and host root through PID 1 before
  # calling systemd/reboot, so the reboot request targets the node, not the
  # container. This depends on the pod settings below:
  # - hostPID=true lets nsenter target the host's PID 1.
  # - securityContext.privileged=true grants the namespace and reboot capabilities.
  # - securityContext.runAsUser=0 runs gpud and nsenter as root.
  rebootCommands: |
    set -o errexit
    set -o nounset

    if command -v nsenter >/dev/null 2>&1; then
      if nsenter --target 1 --mount --uts --ipc --net --pid --cgroup --root --wd=/ -- /usr/bin/systemctl reboot; then
        exit 0
      fi
      nsenter --target 1 --mount --uts --ipc --net --pid --cgroup --root --wd=/ -- /sbin/reboot
      exit 0
    fi

    sudo reboot

  # Command prefixes the disk component uses to inspect the host's disks.
  #
  # gpud runs inside a container here, so "findmnt"/"lsblk"/statfs executed in the
  # container's mount namespace report the container's overlay rootfs instead of
  # the node's real filesystems (e.g. the root disk and any data disks). The chart
  # therefore wraps these tools with "nsenter --target 1 --mount --" by default so
  # they run in the host's mount namespace and report the node's disks. gpud
  # appends the flags it controls (e.g. findmnt --target ... --json --df).
  #
  # This depends on the same pod settings as rebootCommands above:
  # - hostPID=true lets nsenter target the host's PID 1.
  # - securityContext.privileged=true grants the namespace-entering capability.
  # - securityContext.runAsUser=0 runs gpud and nsenter as root.
  #
  # Set any of these to "" to disable the override and use gpud's built-in
  # in-namespace behavior (appropriate for non-privileged or bare-metal setups).
  findmntCommands: "nsenter --target 1 --mount -- findmnt"
  lsblkCommands: "nsenter --target 1 --mount -- lsblk"
  blockdevUsageCommands: "nsenter --target 1 --mount -- df"

  # Command used by the containerd component to check whether the containerd
  # service is active. gpud runs inside a container here, so the container's own
  # systemd does not manage containerd; the chart wraps "systemctl is-active
  # containerd" with nsenter so the check queries the host's service manager
  # (exit code 0 means active). Requires the host containerd mounts below
  # (mountContainerd) plus the same hostPID/privileged settings as above.
  # Set to "" to use gpud's built-in in-namespace systemd check.
  containerdServiceActiveCommands: "nsenter --target 1 --mount -- systemctl is-active containerd"

  # Mount the host containerd directories so the containerd component can monitor
  # the node's containerd when gpud runs inside a container:
  #   - /run/containerd (read-write): stat the socket and reach the CRI endpoint
  #     at unix:///run/containerd/containerd.sock.
  #   - /etc/containerd (read-only): read config.toml to verify the NVIDIA runtime
  #     is configured. Without this, gpud sees only the container image's stub
  #     config and falsely reports the NVIDIA runtime as missing.
  # Both use hostPath type DirectoryOrCreate, so the pod still starts on nodes
  # without containerd (the component then reports containerd as not installed).
  # Set to false on nodes that do not run containerd (e.g. docker/cri-o only).
  mountContainerd: true

  # Mount /dev/mem for deep hardware inspection and memory diagnostics (e.g., PCIe config space).
  # Defaults to false for maximum compatibility across platforms (addresses issue #1144).
  # Set to true if you need deep memory inspection and your environment supports /dev/mem.
  # On GKE and some other platforms, /dev/mem is not available as a CharDevice,
  # causing pod creation failures if this is enabled.
  #
  # Set to "false" to resolve https://github.com/leptonai/gpud/issues/1144.
  # On platforms like GKE, /dev/mem is not available as a CharDevice, causing pod failures.
  #
  # Set to "true" only if your environment supports /dev/mem and you need deep diagnostics.
  mountHostDevMem: false

  # Mount /sys for hardware and device information access.
  # Required for: InfiniBand monitoring, DMI/hardware info, FUSE filesystem stats.
  # Defaults to true as it's essential for most gpud functionality.
  # Set to false in security-sensitive environments where these features aren't needed.
  mountHostSys: true

  # Mount /proc for kernel and process information access.
  # Required for: file descriptor limits, boot_id, mount point information.
  # Defaults to true as it's essential for most gpud functionality.
  # Set to false in security-sensitive environments where these features aren't needed.
  mountHostProc: true

  # Override the default command for the gpud container.
  # If set, the chart's default startup wrapper is bypassed; include any gpud
  # flags you still need there, including --reboot-commands and the disk
  # --findmnt-commands/--lsblk-commands/--blockdev-usage-commands when applicable.
  commandOverride: []

# Reference to one or more secrets to be used for pulling images from private registries.
# Example for NVIDIA NGC registry (nvcr.io):
#
# First, create a Kubernetes secret with your NGC API key:
#   kubectl create secret docker-registry ngc-secret \
#     --docker-server=nvcr.io \
#     --docker-username='$oauthtoken' \
#     --docker-password='nvapi-YOUR-API-KEY' \
#     --namespace=<your-namespace>
#
# Then reference the secret here:
# imagePullSecrets:
#   - name: ngc-secret
imagePullSecrets: []

# Additional annotations to add to the pod.
podAnnotations: {}

# Creates a headless Service for the DaemonSet.
# When enabled, this creates:
# - A headless Service (clusterIP: None) for ServiceMonitor/Prometheus discovery
# - containerPort definition in the pod spec
#
# Use cases:
# - Prometheus ServiceMonitor: Set enabled=true, then create a ServiceMonitor targeting this Service
# - Prometheus PodMonitor: Set enabled=true (for containerPort), then create a PodMonitor
# - Direct access: GPUd uses hostNetwork, so access via https://<node-ip>:15132 always works
service:
  enabled: false
  # Port must match the port in gpud.listenAddress (default 15132).
  port: 15132

# Liveness and Readiness probes.
livenessProbe:
  httpGet:
    path: /healthz
    port: 15132
    scheme: HTTPS
# No readinessProbe is defined

updateStrategy:
  rollingUpdate:
    # This MUST be an integer for a DaemonSet. It cannot be a percentage.
    maxUnavailable: 1

# Container-level security context.
securityContext:
  # WARNING: This chart requires privileged access to the host node.
  # The default rebootCommands script enters the host namespaces with nsenter and must
  # have CAP_SYS_ADMIN/CAP_SYS_BOOT, which privileged mode provides.
  privileged: true
  # Required so gpud can use the built-in reboot path when rebootCommands is empty
  # and so the chart default rebootCommands script can enter host namespaces as root.
  runAsUser: 0
  # Keep this explicit because the chart intentionally runs host-level tooling.
  # Setting this false can break nsenter-based reboot commands.
  allowPrivilegeEscalation: true

# Pod-level security context.
podSecurityContext: {}
  # fsGroup: 2000

# Resource requests and limits for the gpud container. The defaults below are
# sane out of the box — end users do not need to set anything here.
#
# Sizing basis: gpud measured at a stable ~20m CPU / ~130Mi memory on a GPU
# worker node. Requests are ~2x that steady state, so the kubelet never ranks
# the pod as exceeding its requests, while still reserving little of the node.
# The limits cap a misbehaving daemon (8x memory headroom before OOM) without
# risking kills in normal operation.
#
# Any request is subtracted from the node's allocatable resources, which
# matters where GPU workloads request whole nodes. To make this DaemonSet
# consume NO allocatable resources, set this to null — NOT {}: an empty map
# merges with and keeps these defaults, while null deletes them:
#   resources: null
# The pod then runs as BestEffort QoS; priorityClassName system-node-critical
# still keeps it scheduled first and evicted last under node pressure.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

# How long to wait in seconds for the pod to shut down gracefully.
terminationGracePeriodSeconds: 10

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use. If not set and create is true, a name is generated.
  name: ""

# The name of the runtime class to use for the pod (e.g., "nvidia").
runtimeClassName: null

# Node selector, tolerations, and affinity for pod scheduling.
nodeSelector: {}
tolerations:
  - operator: "Exists"

# Optional pod affinity. Empty by default so GPUd can run on GPU and non-GPU nodes.
affinity: {}

# Example: schedule only on nodes with NVIDIA GPUs.
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         - key: nvidia.com/gpu.product
#           operator: Exists

# Example: schedule only on nodes with a machine ID label.
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         - key: lepton.ai/machine-id
#           operator: Exists

# Extra volumes for the pod.
extraVolumes: []

# Extra volume mounts for the pod.
extraVolumeMounts: []

# Optional, init-only Kubernetes node-label reader for gpud configuration.
nodeLabelExporter:
  # When enabled, creates an init container that fetches node labels before gpud
  # starts and writes them to a file for endpoint/token/machine-id configuration.
  # WHY no sidecar: gpud reads this file only while constructing its startup
  # arguments, so a sidecar updating it later cannot reload the running process.
  # A successful label read is intentionally a startup prerequisite when enabled:
  # the init container retries until it has written a fresh, complete snapshot.
  # When disabled, no label init container is rendered, gpud starts normally,
  # and any stale host-mounted node-labels.env from an earlier release is ignored.
  # Requires RBAC permissions - set nodeLabelExporter.rbac.create=true.
  enabled: false
  image:
    # Use a shell-capable kubectl image. Distroless kubectl images (registry.k8s.io/kubectl)
    # do not include /bin/sh, but the init script relies on a POSIX shell.
    # NOTE: Bitnami removed their public ECR mirror (public.ecr.aws/bitnami) in 2025,
    # so we use the Docker Hub bitnami/kubectl image. Override if you mirror it
    # elsewhere or hit Docker Hub rate limits.
    repository: docker.io/bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
  # Path of the label file handed from the init container to gpud. Its parent
  # directory is a pod-scoped emptyDir mounted in both containers: gpud reads
  # the file only once at startup, so nothing needs to persist on the host,
  # and a fresh volume per pod means no stale file from a previous release.
  # Keep it OUTSIDE paths the gpud container already mounts (e.g.
  # /var/lib/gpud), or the two mounts would collide.
  outputFile: /run/gpud-node-labels/node-labels.env
  # Label keys to look for in the node labels.
  # For BYOK worker clusters, set machineId to the label that stores the
  # platform machine ID (for example, lepton.ai/machine-id) so gpud rejoins
  # with the same machine ID even if the host /etc/machine-id changes.
  #
  # machineId is the UNIQUE per-node identity ("which machine am I?"): each node
  # carries its own value, and passing it to "gpud run --machine-id" is what
  # keeps a node registered as the SAME machine across pod restarts, DaemonSet
  # replacement, or node reimage. (The token, by contrast, is shared across all
  # nodes -- see gpud.tokenSecret. token = "may I join?", machineId = "who am I?".)
  # endpoint/token here are optional label-based alternatives to gpud.endpoint and
  # gpud.tokenSecret; leave them unmatched to use those values instead.
  labelKeys:
    endpoint: gpud.dgxc.lepton.ai/endpoint
    token: gpud.dgxc.lepton.ai/token
    machineId: gpud.dgxc.lepton.ai/machine-id
  # Extra environment variables for the node-label init container.
  extraEnv: []
  rbac:
    create: true
  # Sized for a one-shot "kubectl get node". These requests sit below the
  # gpud container's, so they do not raise the pod's effective request.
  # As with the top-level resources, set to null (not {}) to remove them.
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi

# [Init containers](https://kubernetes.io/docs/concepts/workloads/pods/init-containers/) to add to the pod definition.
initContainers: []
